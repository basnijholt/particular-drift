name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.1 or v0.1.1. Defaults to package.json version.'
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.repository == 'basnijholt/particular-drift'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          VERSION="${VERSION#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semver version like v1.2.3 or v1.2.3-beta.1; got '$VERSION'." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version from release tag
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish
